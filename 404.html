<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found — GTA Scrub</title>
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.min.css">
<style>.nf-wrap{text-align:center;padding:8rem 2rem 6rem;min-height:60vh;display:flex;flex-direction:column;justify-content:center;align-items:center}.nf-wrap h1{font-family:"Plus Jakarta Sans",sans-serif;font-size:6rem;font-weight:800;color:var(--color-primary);line-height:1;margin-bottom:.5rem}.nf-wrap h2{font-family:"Plus Jakarta Sans",sans-serif;font-size:1.75rem;font-weight:700;margin-bottom:.75rem}.nf-wrap p{color:var(--color-text-muted);margin-bottom:2rem;max-width:400px}</style>
    <!-- ============================================
         ANIMATION LIBRARY STACK — DO NOT REORDER
         ============================================ -->

    <!-- Lenis smooth scroll -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">

    <!-- GSAP core + ScrollTrigger + SplitText (now free) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js" defer></script>

    <!-- SplitType (free, open-source SplitText alternative) -->
    <script src="https://unpkg.com/split-type@0.3.4/umd/index.js" defer></script>

    <!-- Swiper.js (testimonials carousel) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>

    <!-- CountUp.js (animated stat counters) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.8.0/countUp.umd.js" defer></script>

    <!-- Barba.js (smooth page transitions) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/barba.js/2.9.7/barba.umd.min.js" defer></script>

    <!-- vanilla-tilt.js (3D card hover effect) -->
    <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js" defer></script>

    <!-- Lenis (loaded last in head so it is available immediately) -->
    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
</head>
<body data-barba="wrapper">
<main data-barba="container" data-barba-namespace="error"><div class="nf-wrap"><h1 data-split="hero">404</h1><h2 data-split="heading">Page Not Found</h2><p data-split="lines">The page you're looking for doesn't exist or has been moved.</p><a href="/" class="btn btn-primary btn-lg">Go Home</a></div></main>
    <!-- ============================================
         SITE ANIMATION SCRIPTS — ORDER MATTERS
         ============================================ -->
    <script src="/js/lib-init.js"></script>
    <script src="/js/splittype-animations.js"></script>
    <script src="/js/animations.js"></script>
</body>
</html>
